<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Planificador Financiero Profesional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef3f8;
margin:0;
color:#222;
}

header{
background:#0a2540;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

input,select{

width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;

}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

button{

margin-top:20px;
padding:14px;
background:#0066ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#004ecc;
}

.result{
margin-top:20px;
background:#f1f5ff;
padding:20px;
border-radius:8px;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>Simulador de Patrimonio y Herencia</h1>
<p>Modelo con Monte Carlo e inflación realista</p>

</header>

<div class="container">

<div class="card">

<h2>Datos personales</h2>

<label>Edad actual</label>
<input id="edad" type="number" value="43">

<label>Edad objetivo</label>
<input id="retiro" type="number" value="65">

<label>Capital actual (€)</label>
<input id="capital" type="number" value="150">

<label>Aportación mensual (€)</label>
<input id="aportacion" type="number" value="150">

<label>Rentabilidad media esperada</label>

<select id="rentabilidad">
<option value="0.07">7% cartera agresiva</option>
<option value="0.06">6% equilibrada</option>
<option value="0.05">5% conservadora</option>
</select>

<label>Inflación media</label>

<select id="inflacion">
<option value="0.025">2.5%</option>
<option value="0.03">3%</option>
<option value="0.02">2%</option>
</select>

<button onclick="simular()">Simular plan financiero</button>

<div class="result" id="resultado"></div>

<canvas id="grafico"></canvas>

</div>

</div>

<script>

let chart;

function randomNormal(mean,vol){

let u1=Math.random()
let u2=Math.random()

let rand=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2)

return mean + vol*rand

}

function simular(){

let edad=parseFloat(document.getElementById("edad").value)
let retiro=parseFloat(document.getElementById("retiro").value)

let capitalInicial=parseFloat(document.getElementById("capital").value)
let aportacion=parseFloat(document.getElementById("aportacion").value)

let r=parseFloat(document.getElementById("rentabilidad").value)
let inflacion=parseFloat(document.getElementById("inflacion").value)

let años=retiro-edad

let simulaciones=1000

let resultados=[]

for(let s=0;s<simulaciones;s++){

let capital=capitalInicial

for(let i=0;i<años;i++){

let retorno=randomNormal(r,0.15)

capital=capital*(1+retorno)+aportacion*12

}

resultados.push(capital)

}

resultados.sort((a,b)=>a-b)

let p10=resultados[Math.floor(simulaciones*0.1)]
let p50=resultados[Math.floor(simulaciones*0.5)]
let p90=resultados[Math.floor(simulaciones*0.9)]

let herencia=p50*Math.pow(1+(r-inflacion),20)

document.getElementById("resultado").innerHTML=

"<b>Escenario conservador (10%):</b> "+Math.round(p10)+" €<br><br>"+

"<b>Escenario medio:</b> "+Math.round(p50)+" €<br><br>"+

"<b>Escenario optimista:</b> "+Math.round(p90)+" €<br><br>"+

"<b>Estimación posible herencia (20 años después):</b> "+Math.round(herencia)+" €"

let ctx=document.getElementById("grafico")

if(chart){chart.destroy()}

chart=new Chart(ctx,{

type:'bar',

data:{

labels:["Escenario malo","Escenario medio","Escenario bueno"],

datasets:[{

label:"Capital posible",

data:[p10,p50,p90]

}]

},

options:{responsive:true}

})

}

</script>

</body>

</html>
