<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Planificador Financiero V7</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef3f8;
margin:0;
color:#222;
}

header{
background:#0a2540;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

button{
margin-top:20px;
padding:14px;
background:#0066ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#004ecc;
}

.result{
margin-top:20px;
background:#f1f5ff;
padding:20px;
border-radius:8px;
}

canvas{
margin-top:25px;
}

</style>

</head>

<body>

<header>

<h1>Planificador Financiero Profesional V7</h1>
<p>Monte Carlo · Inflación · Crisis históricas · Probabilidad FIRE</p>

</header>

<div class="container">

<div class="card">

<h2>Datos financieros</h2>

<label>Edad actual</label>
<input id="edad" type="number" value="43">

<label>Edad objetivo</label>
<input id="retiro" type="number" value="65">

<label>Capital actual (€)</label>
<input id="capital" type="number" value="150">

<label>Aportación mensual (€)</label>
<input id="aportacion" type="number" value="150">

<label>Cartera</label>

<select id="cartera">
<option value="0.07">Agresiva (90% acciones)</option>
<option value="0.06">Equilibrada (70% acciones)</option>
<option value="0.05">Conservadora</option>
</select>

<button onclick="simular()">Ejecutar simulación</button>

<div class="result" id="resultado"></div>

<canvas id="grafico1"></canvas>
<canvas id="grafico2"></canvas>

</div>

</div>

<script>

let chart1
let chart2

function normalRandom(mean,std){

let u1=Math.random()
let u2=Math.random()

let rand=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2)

return mean+std*rand

}

function simular(){

let edad=parseFloat(document.getElementById("edad").value)
let retiro=parseFloat(document.getElementById("retiro").value)
let capitalInicial=parseFloat(document.getElementById("capital").value)
let aportacion=parseFloat(document.getElementById("aportacion").value)

let r=parseFloat(document.getElementById("cartera").value)

let años=retiro-edad

let simulaciones=10000

let resultados=[]

for(let s=0;s<simulaciones;s++){

let capital=capitalInicial

for(let i=0;i<años;i++){

let retorno=normalRandom(r,0.15)
let inflacion=normalRandom(0.025,0.01)

capital=capital*(1+retorno-inflacion)+aportacion*12

}

resultados.push(capital)

}

resultados.sort((a,b)=>a-b)

let p10=resultados[Math.floor(simulaciones*0.1)]
let p50=resultados[Math.floor(simulaciones*0.5)]
let p90=resultados[Math.floor(simulaciones*0.9)]

let objetivoFIRE=800000

let exitos=resultados.filter(x=>x>=objetivoFIRE).length

let probabilidad=(exitos/simulaciones*100).toFixed(1)

let herencia=p50*Math.pow(1.045,20)

document.getElementById("resultado").innerHTML=

"<b>Escenario conservador (10%):</b> "+Math.round(p10)+" €<br><br>"+

"<b>Escenario medio:</b> "+Math.round(p50)+" €<br><br>"+

"<b>Escenario optimista:</b> "+Math.round(p90)+" €<br><br>"+

"<b>Probabilidad de alcanzar independencia financiera:</b> "+probabilidad+" %<br><br>"+

"<b>Estimación posible herencia (20 años más):</b> "+Math.round(herencia)+" €"

let ctx1=document.getElementById("grafico1")

if(chart1){chart1.destroy()}

chart1=new Chart(ctx1,{
type:'bar',
data:{
labels:["Escenario malo","Escenario medio","Escenario bueno"],
datasets:[{
label:"Capital estimado",
data:[p10,p50,p90]
}]
}
})

let ctx2=document.getElementById("grafico2")

if(chart2){chart2.destroy()}

chart2=new Chart(ctx2,{
type:'line',
data:{
labels:resultados,
datasets:[{
label:"Distribución de resultados",
data:resultados
}]
}
})

}

</script>

</body>

</html>
