<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Valoración Fundamental V11</title>
<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:#161616;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0 15px 0;
}

button{
padding:10px;
background:#2ecc71;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
background:#111;
padding:20px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Modelo Valoración Fundamental V11</h2>

<label>Precio actual</label>
<input id="precio">

<label>EPS</label>
<input id="eps">

<label>Crecimiento anual (%)</label>
<input id="crecimiento">

<label>Margen neto (%)</label>
<input id="margen">

<label>Volatilidad (0-1)</label>
<input id="vol">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

precio = parseFloat(document.getElementById("precio").value)
eps = parseFloat(document.getElementById("eps").value)
crecimiento = parseFloat(document.getElementById("crecimiento").value)/100
margen = parseFloat(document.getElementById("margen").value)/100
vol = parseFloat(document.getElementById("vol").value)

if(!precio || !eps || !crecimiento || !margen || !vol){
alert("Completa todos los campos")
return
}

PE = 15

valorReal = eps * PE

descuento = (valorReal - precio) / valorReal

// Inflación histórica
inflacion = 0.025
horizonte = 5

ajusteInflacion = 1 + (inflacion * horizonte)

valorRealInflacion = valorReal * ajusteInflacion

// Score value mejorado
estabilidad = 1 / vol

scoreValue = descuento * crecimiento * estabilidad

// margen seguridad
margenSeguridad = descuento * margen

// índice calidad
qualityIndex = (crecimiento + margen) / vol

// indicador final
indicador = scoreValue * margenSeguridad * qualityIndex * ajusteInflacion

// precio objetivo
precioObjetivo = valorRealInflacion * (1 + crecimiento * horizonte)

document.getElementById("resultado").innerHTML = `

Valor Real: ${valorReal.toFixed(2)}

Valor Real Ajustado Inflación: ${valorRealInflacion.toFixed(2)}

Descuento: ${(descuento*100).toFixed(2)}%

Score Value: ${scoreValue.toFixed(2)}

Quality Index: ${qualityIndex.toFixed(2)}

Indicador Final V11: ${indicador.toFixed(2)}

Precio Objetivo 5 años: ${precioObjetivo.toFixed(2)}

`

}

</script>

</body>
</html>
